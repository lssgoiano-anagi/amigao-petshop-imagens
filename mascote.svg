<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" shape-rendering="geometricPrecision">
  <!-- Shadow -->
  <defs>
    <filter id="sombra" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000030"/>
    </filter>
    <radialGradient id="bgCircle" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0ece6"/>
    </radialGradient>
    <radialGradient id="faceFur" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f8edd8"/>
      <stop offset="100%" stop-color="#e8d4b8"/>
    </radialGradient>
    <radialGradient id="brownFur" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#9B5030"/>
      <stop offset="100%" stop-color="#6B3018"/>
    </radialGradient>
    <radialGradient id="barrelGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a0622a"/>
      <stop offset="100%" stop-color="#6b3a10"/>
    </radialGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="193" fill="#1a0f0a"/>
  <!-- Inner white background -->
  <circle cx="200" cy="200" r="186" fill="url(#bgCircle)" filter="url(#sombra)"/>

  <!-- ── EARS ── -->
  <!-- Left ear (back layer) -->
  <ellipse cx="112" cy="195" rx="46" ry="68" fill="url(#brownFur)" transform="rotate(-12 112 195)"/>
  <ellipse cx="112" cy="195" rx="32" ry="52" fill="#7B3820" opacity="0.6" transform="rotate(-12 112 195)"/>
  <!-- Right ear (back layer) -->
  <ellipse cx="288" cy="195" rx="46" ry="68" fill="url(#brownFur)" transform="rotate(12 288 195)"/>
  <ellipse cx="288" cy="195" rx="32" ry="52" fill="#7B3820" opacity="0.6" transform="rotate(12 288 195)"/>

  <!-- ── NECK / CHEST ── -->
  <ellipse cx="200" cy="308" rx="62" ry="38" fill="url(#faceFur)"/>

  <!-- ── BARREL ── -->
  <!-- Main barrel body -->
  <rect x="152" y="285" width="96" height="62" rx="10" fill="url(#barrelGrad)"/>
  <!-- Barrel wood grain lines -->
  <line x1="152" y1="298" x2="248" y2="298" stroke="#5a2e08" stroke-width="5" stroke-linecap="round"/>
  <line x1="152" y1="323" x2="248" y2="323" stroke="#5a2e08" stroke-width="5" stroke-linecap="round"/>
  <!-- Barrel end caps -->
  <rect x="146" y="280" width="108" height="13" rx="6" fill="#5a2e08"/>
  <rect x="146" y="334" width="108" height="13" rx="6" fill="#5a2e08"/>
  <!-- Red cross - vertical -->
  <rect x="195" y="279" width="11" height="72" rx="4" fill="#d01818"/>
  <!-- Red cross - horizontal -->
  <rect x="155" y="298" width="90" height="13" rx="4" fill="#d01818"/>
  <!-- Cross highlight -->
  <rect x="197" y="279" width="4" height="72" rx="2" fill="#ff4040" opacity="0.4"/>
  <rect x="155" y="299" width="90" height="5" rx="2" fill="#ff4040" opacity="0.4"/>

  <!-- ── HEAD BASE ── -->
  <ellipse cx="200" cy="178" rx="96" ry="88" fill="url(#faceFur)"/>

  <!-- Brown patch top of head -->
  <ellipse cx="200" cy="116" rx="68" ry="42" fill="url(#brownFur)"/>

  <!-- Brown cheek patches -->
  <ellipse cx="138" cy="172" rx="36" ry="44" fill="#8B4020" opacity="0.55"/>
  <ellipse cx="262" cy="172" rx="36" ry="44" fill="#8B4020" opacity="0.55"/>

  <!-- ── EYES ── -->
  <!-- Eye whites with slight shadow -->
  <ellipse cx="170" cy="164" rx="22" ry="21" fill="white"/>
  <ellipse cx="230" cy="164" rx="22" ry="21" fill="white"/>
  <!-- Iris -->
  <circle cx="173" cy="166" r="14" fill="#3d2008"/>
  <circle cx="233" cy="166" r="14" fill="#3d2008"/>
  <!-- Pupil -->
  <circle cx="175" cy="168" r="8" fill="#0d0604"/>
  <circle cx="235" cy="168" r="8" fill="#0d0604"/>
  <!-- Eye shine -->
  <circle cx="180" cy="161" r="5" fill="white" opacity="0.9"/>
  <circle cx="240" cy="161" r="5" fill="white" opacity="0.9"/>
  <circle cx="169" cy="173" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="229" cy="173" r="2.5" fill="white" opacity="0.5"/>
  <!-- Eyebrow lines -->
  <path d="M 152 148 Q 170 141 188 147" stroke="#7B3820" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 212 147 Q 230 141 248 148" stroke="#7B3820" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- ── MUZZLE ── -->
  <ellipse cx="200" cy="208" rx="42" ry="32" fill="#f0e0c4"/>

  <!-- ── NOSE ── -->
  <ellipse cx="200" cy="198" rx="25" ry="18" fill="#1a0f0a"/>
  <!-- Nose nostrils -->
  <ellipse cx="190" cy="202" rx="6" ry="5" fill="#0a0505"/>
  <ellipse cx="210" cy="202" rx="6" ry="5" fill="#0a0505"/>
  <!-- Nose shine -->
  <ellipse cx="193" cy="193" rx="7" ry="4" fill="#555" opacity="0.45"/>

  <!-- ── MOUTH ── -->
  <path d="M 182 218 Q 200 230 218 218" stroke="#a06030" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ── TONGUE ── -->
  <ellipse cx="222" cy="244" rx="19" ry="24" fill="#e02828"/>
  <!-- Tongue tip -->
  <ellipse cx="222" cy="262" rx="19" ry="8" fill="#e02828"/>
  <!-- Tongue center groove -->
  <line x1="222" y1="223" x2="222" y2="268" stroke="#b01818" stroke-width="3" stroke-linecap="round"/>
  <!-- Tongue highlight -->
  <ellipse cx="215" cy="237" rx="6" ry="10" fill="#ff5555" opacity="0.4"/>

  <!-- ── SUBTLE FACE DETAILS ── -->
  <!-- Cheek flush -->
  <ellipse cx="148" cy="192" rx="16" ry="10" fill="#ff9999" opacity="0.2"/>
  <ellipse cx="252" cy="192" rx="16" ry="10" fill="#ff9999" opacity="0.2"/>
</svg>
