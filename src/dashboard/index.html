<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amigão Pet Shop — Central de Atendimento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #2ecc71;
      --green-d: #27ae60;
      --orange:  #f39c12;
      --red:     #e74c3c;
      --blue:    #3498db;
      --dark:    #1a1a2e;
      --panel:   #16213e;
      --card:    #0f3460;
      --border:  #1e4080;
      --text:    #ecf0f1;
      --muted:   #8899aa;
      --bot:     #2ecc71;
      --human:   #f39c12;
      --closed:  #7f8c8d;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Cabeçalho ───────────────────────────────── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header span { font-size: .8rem; color: var(--muted); }
    .logo { font-size: 1.5rem; }

    .stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
    }
    .stat {
      text-align: center;
      padding: 4px 12px;
      border-radius: 8px;
      background: var(--card);
      min-width: 60px;
    }
    .stat-n { font-size: 1.2rem; font-weight: 700; }
    .stat-l { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat.bot    .stat-n { color: var(--bot); }
    .stat.human  .stat-n { color: var(--human); }
    .stat.closed .stat-n { color: var(--closed); }

    /* ── Login ───────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 340px;
      text-align: center;
    }
    .login-box h2 { margin: 12px 0 8px; }
    .login-box p  { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 1rem; margin-bottom: 12px;
    }
    .login-box button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: var(--green); color: #fff; font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }
    .login-box button:hover { background: var(--green-d); }
    #login-error { color: var(--red); font-size: .85rem; margin-top: 8px; }

    /* ── Layout principal ─────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      width: 320px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-filters {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
    }
    .filter-btn {
      flex: 1; padding: 6px 4px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: .75rem;
      cursor: pointer; transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .conv-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .conv-item:hover { background: var(--card); }
    .conv-item.active { background: var(--card); border-left: 3px solid var(--blue); }

    .conv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .conv-name { font-weight: 600; font-size: .9rem; }
    .conv-phone { font-size: .7rem; color: var(--muted); }
    .conv-time  { font-size: .7rem; color: var(--muted); }

    .conv-preview { font-size: .8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
    }
    .badge-bot    { background: #1a4d2e; color: var(--bot); }
    .badge-human  { background: #4d3000; color: var(--human); }
    .badge-closed { background: #2c2c2c; color: var(--closed); }

    .empty-list {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
    }

    /* ── Painel de conversa ───────────────────────── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-topbar-info { flex: 1; }
    .chat-topbar-name { font-weight: 700; font-size: 1rem; }
    .chat-topbar-sub  { font-size: .75rem; color: var(--muted); }

    .action-btn {
      padding: 8px 14px; border-radius: 8px; border: none;
      font-size: .8rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .action-btn:hover { opacity: .85; }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-gray   { background: #4a4a5a;       color: #fff; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: .9rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg-customer {
      align-self: flex-start;
      background: var(--card);
      border-bottom-left-radius: 4px;
    }
    .msg-bot {
      align-self: flex-end;
      background: #1a4d2e;
      border-bottom-right-radius: 4px;
    }
    .msg-human {
      align-self: flex-end;
      background: #4d3000;
      border-bottom-right-radius: 4px;
    }
    .msg-meta {
      font-size: .65rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .no-conv {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
    }
    .no-conv-icon { font-size: 3rem; }
    .no-conv p { font-size: .95rem; }

    /* ── Área de resposta ─────────────────────────── */
    .reply-bar {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .reply-bar textarea {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: .9rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.4;
    }
    .reply-bar textarea:focus { outline: none; border-color: var(--blue); }
    .reply-bar textarea:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      height: 44px;
    }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn:hover:not(:disabled) { background: #2980b9; }

    /* ── Templates rápidos ───────────────────────── */
    .quick-replies {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--panel);
    }
    .qr-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .75rem;
      cursor: pointer;
      transition: all .15s;
    }
    .qr-btn:hover { border-color: var(--blue); color: var(--text); }

    /* ── Scrollbar ───────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* ── Toast ───────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #333; color: #fff;
      padding: 10px 18px; border-radius: 10px;
      font-size: .85rem; opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:3rem">🐾</div>
    <h2>Amigão Pet Shop</h2>
    <p>Central de Atendimento WhatsApp</p>
    <input id="pass-input" type="password" placeholder="Senha de acesso" />
    <button onclick="doLogin()">Entrar</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- App -->
<header>
  <div class="logo">🐾</div>
  <div>
    <h1>Amigão Pet Shop</h1>
    <span>Central de Atendimento WhatsApp</span>
  </div>
  <div class="stats">
    <div class="stat bot">
      <div class="stat-n" id="stat-bot">—</div>
      <div class="stat-l">🤖 Bot</div>
    </div>
    <div class="stat human">
      <div class="stat-n" id="stat-human">—</div>
      <div class="stat-l">👤 Humano</div>
    </div>
    <div class="stat closed">
      <div class="stat-n" id="stat-closed">—</div>
      <div class="stat-l">✅ Fechados</div>
    </div>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-filters">
      <button class="filter-btn active" onclick="setFilter(null, this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('bot', this)">🤖 Bot</button>
      <button class="filter-btn" onclick="setFilter('human', this)">👤 Humano</button>
      <button class="filter-btn" onclick="setFilter('closed', this)">✅ Fechadas</button>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="empty-list">Carregando...</div>
    </div>
  </aside>

  <!-- Painel de chat -->
  <section class="chat-panel" id="chat-panel">
    <div class="no-conv" id="no-conv">
      <div class="no-conv-icon">💬</div>
      <p>Selecione uma conversa para visualizar</p>
    </div>
    <div id="conv-view" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">
      <!-- Topbar -->
      <div class="chat-topbar" id="chat-topbar">
        <div class="chat-topbar-info">
          <div class="chat-topbar-name" id="topbar-name">—</div>
          <div class="chat-topbar-sub" id="topbar-sub">—</div>
        </div>
        <div id="topbar-actions" style="display:flex; gap:8px;"></div>
      </div>
      <!-- Mensagens -->
      <div class="messages" id="messages"></div>
      <!-- Templates rápidos -->
      <div class="quick-replies" id="quick-replies" style="display:none;">
        <button class="qr-btn" onclick="insertTemplate('Olá! Como posso te ajudar? 😊')">Saudação</button>
        <button class="qr-btn" onclick="insertTemplate('Entendido! Vou verificar isso agora para você. ⏳')">Verificando</button>
        <button class="qr-btn" onclick="insertTemplate('Agendamento confirmado! ✅ Até breve! 🐾')">Agendamento OK</button>
        <button class="qr-btn" onclick="insertTemplate('Obrigado pelo contato! Qualquer dúvida, estamos aqui. ❤️')">Encerrar</button>
        <button class="qr-btn" onclick="insertTemplate('Nosso horário é Seg-Sex 8h-18h e Sáb 8h-17h. 🕐')">Horário</button>
        <button class="qr-btn" onclick="insertTemplate('Para confirmar o agendamento, preciso do nome do seu pet, serviço desejado e data/horário preferido. 📅')">Confirmar agendam.</button>
      </div>
      <!-- Barra de resposta -->
      <div class="reply-bar" id="reply-bar" style="display:none;">
        <textarea id="reply-text" placeholder="Digite sua resposta como atendente..." rows="1"
          onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendReply()">Enviar</button>
      </div>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
  // ── Estado ──────────────────────────────────────
  let PASSWORD = '';
  let currentFilter = null;
  let currentConvId = null;
  let agentName = '';
  let pollInterval = null;
  let msgPollInterval = null;

  // ── Login ───────────────────────────────────────
  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pass = document.getElementById('pass-input').value.trim();
    if (!pass) return;

    try {
      const r = await fetch('/api/stats?password=' + encodeURIComponent(pass));
      if (r.status === 401) {
        document.getElementById('login-error').textContent = 'Senha incorreta.';
        return;
      }
      PASSWORD = pass;
      agentName = prompt('Qual é o seu nome de atendente?', 'Atendente') || 'Atendente';
      document.getElementById('login-screen').style.display = 'none';
      startPolling();
    } catch {
      document.getElementById('login-error').textContent = 'Erro de conexão com o servidor.';
    }
  }

  // ── Autenticação fetch ─────────────────────────
  function apiFetch(path, opts = {}) {
    return fetch('/api' + path, {
      ...opts,
      headers: { 'x-dashboard-password': PASSWORD, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    });
  }

  // ── Polling ─────────────────────────────────────
  function startPolling() {
    loadConversations();
    loadStats();
    pollInterval = setInterval(() => { loadConversations(); loadStats(); }, 5000);
  }

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadConversations();
  }

  // ── Estatísticas ────────────────────────────────
  async function loadStats() {
    try {
      const r = await apiFetch('/stats');
      const d = await r.json();
      document.getElementById('stat-bot').textContent    = d.bot;
      document.getElementById('stat-human').textContent  = d.human;
      document.getElementById('stat-closed').textContent = d.closed;
    } catch {}
  }

  // ── Lista de conversas ──────────────────────────
  async function loadConversations() {
    try {
      const qs = currentFilter ? `?status=${currentFilter}` : '';
      const r = await apiFetch('/conversations' + qs);
      const convs = await r.json();
      renderConvList(convs);
    } catch {}
  }

  function renderConvList(convs) {
    const el = document.getElementById('conv-list');
    if (!convs.length) {
      el.innerHTML = '<div class="empty-list">Nenhuma conversa encontrada.</div>';
      return;
    }
    el.innerHTML = convs.map(c => `
      <div class="conv-item${c.id === currentConvId ? ' active' : ''}" onclick="openConv(${c.id})">
        <div class="conv-header">
          <span class="conv-name">${esc(c.customer_name || c.phone)}</span>
          <span class="badge badge-${c.status}">${labelStatus(c.status)}</span>
        </div>
        <div class="conv-header" style="margin-bottom:4px;">
          <span class="conv-phone">${esc(c.phone)}</span>
          <span class="conv-time">${timeAgo(c.last_message_at || c.updated_at)}</span>
        </div>
        <div class="conv-preview">${esc(c.last_message || '—')}</div>
      </div>
    `).join('');
  }

  // ── Abrir conversa ──────────────────────────────
  async function openConv(id) {
    currentConvId = id;
    document.getElementById('no-conv').style.display = 'none';
    const view = document.getElementById('conv-view');
    view.style.display = 'flex';

    if (msgPollInterval) clearInterval(msgPollInterval);
    await loadConvDetail(id);
    msgPollInterval = setInterval(() => loadConvDetail(id), 4000);

    // Highlight na lista
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const items = document.querySelectorAll('.conv-item');
    items.forEach(el => { if (el.onclick.toString().includes(`openConv(${id})`)) el.classList.add('active'); });
    loadConversations();
  }

  async function loadConvDetail(id) {
    try {
      const r = await apiFetch(`/conversations/${id}`);
      if (!r.ok) return;
      const conv = await r.json();
      renderConvDetail(conv);
    } catch {}
  }

  function renderConvDetail(conv) {
    // Topbar
    document.getElementById('topbar-name').textContent =
      conv.customer_name ? `${conv.customer_name} (${conv.phone})` : conv.phone;
    document.getElementById('topbar-sub').textContent =
      `Status: ${labelStatus(conv.status)}${conv.agent ? ' — Atendente: ' + conv.agent : ''}` +
      (conv.pets?.length ? ` | Pets: ${conv.pets.map(p => p.name).join(', ')}` : '');

    // Ações
    const acts = document.getElementById('topbar-actions');
    acts.innerHTML = '';
    if (conv.status === 'bot') {
      btn(acts, '👤 Assumir', 'btn-orange', () => handoff(conv.id));
    } else if (conv.status === 'human') {
      btn(acts, '🤖 Devolver ao Bot', 'btn-green', () => returnToBot(conv.id));
    }
    if (conv.status !== 'closed') {
      btn(acts, '✅ Encerrar', 'btn-red', () => closeConv(conv.id));
    }

    // Mensagens
    const el = document.getElementById('messages');
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
    el.innerHTML = conv.messages.map(m => `
      <div>
        <div class="msg msg-${m.sender}">${esc(m.content)}</div>
        <div class="msg-meta" style="text-align:${m.sender === 'customer' ? 'left' : 'right'}">
          ${m.sender === 'customer' ? '👤 Cliente' : m.sender === 'human' ? '🧑 ' + (conv.agent || 'Atendente') : '🤖 Bot'}
          · ${fmtTime(m.created_at)}
        </div>
      </div>
    `).join('');
    if (atBottom) el.scrollTop = el.scrollHeight;

    // Barra de resposta — visível apenas quando em modo humano
    const replyBar = document.getElementById('reply-bar');
    const quickReplies = document.getElementById('quick-replies');
    const replyText = document.getElementById('reply-text');
    const sendBtn = document.getElementById('send-btn');

    if (conv.status === 'human') {
      replyBar.style.display = 'flex';
      quickReplies.style.display = 'flex';
      replyText.disabled = false;
      sendBtn.disabled = false;
    } else {
      replyBar.style.display = 'flex';
      quickReplies.style.display = 'none';
      replyText.disabled = true;
      sendBtn.disabled = true;
      replyText.placeholder = conv.status === 'bot'
        ? 'Bot está atendendo. Clique em "Assumir" para responder.'
        : 'Conversa encerrada.';
    }
  }

  // ── Ações ────────────────────────────────────────
  async function handoff(id) {
    await apiFetch(`/conversations/${id}/handoff`, {
      method: 'POST',
      body: JSON.stringify({ agent: agentName }),
    });
    toast('Você assumiu o atendimento!');
    loadConvDetail(id);
    loadStats();
  }

  async function returnToBot(id) {
    if (!confirm('Devolver conversa para o bot?')) return;
    await apiFetch(`/conversations/${id}/bot`, { method: 'POST' });
    toast('Conversa devolvida ao bot.');
    loadConvDetail(id);
    loadStats();
  }

  async function closeConv(id) {
    if (!confirm('Encerrar esta conversa?')) return;
    await apiFetch(`/conversations/${id}/close`, { method: 'POST' });
    toast('Conversa encerrada.');
    loadConvDetail(id);
    loadStats();
    loadConversations();
  }

  async function sendReply() {
    const text = document.getElementById('reply-text').value.trim();
    if (!text || !currentConvId) return;

    document.getElementById('send-btn').disabled = true;
    try {
      const r = await apiFetch(`/conversations/${currentConvId}/reply`, {
        method: 'POST',
        body: JSON.stringify({ text, agent: agentName }),
      });
      if (r.ok) {
        document.getElementById('reply-text').value = '';
        loadConvDetail(currentConvId);
      } else {
        toast('Erro ao enviar mensagem.', true);
      }
    } catch {
      toast('Erro de conexão.', true);
    } finally {
      document.getElementById('send-btn').disabled = false;
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendReply();
    }
  }

  function insertTemplate(text) {
    const ta = document.getElementById('reply-text');
    ta.value = text;
    ta.focus();
  }

  // ── Helpers ──────────────────────────────────────
  function btn(parent, label, cls, onClick) {
    const b = document.createElement('button');
    b.className = 'action-btn ' + cls;
    b.textContent = label;
    b.onclick = onClick;
    parent.appendChild(b);
  }

  function labelStatus(s) {
    return { bot: 'Bot', human: 'Humano', closed: 'Fechada' }[s] || s;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function fmtTime(dt) {
    if (!dt) return '';
    const d = new Date(dt.endsWith('Z') ? dt : dt + 'Z');
    return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function timeAgo(dt) {
    if (!dt) return '';
    const diff = Date.now() - new Date(dt.endsWith('Z') ? dt : dt + 'Z').getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'agora';
    if (m < 60) return `${m}min`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h`;
    return `${Math.floor(h / 24)}d`;
  }

  function toast(msg, error = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = error ? '#c0392b' : '#2ecc71';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
