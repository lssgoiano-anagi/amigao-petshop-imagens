<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amigão Petshop – Galeria de Artes</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    :root{--verde:#2ECC71;--verde-esc:#1a9e52;--azul:#3498DB;--laranja:#F39C12;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:#f0faf4;color:#1a2e1e;}
    header{background:linear-gradient(135deg,#1a9e52 0%,#2ECC71 55%,#F39C12 100%);color:#fff;text-align:center;padding:32px 20px 26px;box-shadow:0 4px 24px rgba(0,0,0,.18);}
    header .logo{font-size:3rem;line-height:1;}
    header h1{font-family:'Fredoka One',cursive;font-size:2.4rem;margin-top:6px;}
    header p{font-size:1rem;opacity:.88;margin-top:5px;}
    .container{max-width:1380px;margin:0 auto;padding:30px 16px 70px;}
    .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
    .filter-btn{padding:9px 22px;border-radius:22px;border:2.5px solid #ccc;background:#fff;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;transition:all .2s;}
    .filter-btn.active,.filter-btn:hover{border-color:var(--verde);background:#e8fdf1;color:#1a9e52;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
    .card{background:#fff;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,.1);overflow:hidden;transition:transform .2s,box-shadow .2s;}
    .card:hover{transform:translateY(-5px);box-shadow:0 10px 32px rgba(0,0,0,.16);}
    .canvas-wrap{position:relative;width:100%;aspect-ratio:1;}
    canvas.arte{width:100%;height:100%;display:block;}
    .loading-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#999;background:#f5f5f5;}
    .card-footer{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .card-info h3{font-size:.95rem;font-weight:800;color:#1a2e1e;}
    .card-info p{font-size:.78rem;color:#666;margin-top:2px;}
    .btn-dl{background:var(--azul);color:#fff;border:none;padding:9px 20px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;transition:transform .15s,box-shadow .15s;white-space:nowrap;flex-shrink:0;}
    .btn-dl:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.16);}
    .total-info{font-size:.9rem;color:#666;margin-bottom:16px;font-weight:700;}
  </style>
</head>
<body>

  <div class="logo">🐾</div>

  <p>Galeria de Artes Prontas • Clique em ⬇️ Baixar e use nas redes sociais</p>
</header>
<div class="container">
  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos',this)">🐾 Todos</button>

    <button class="filter-btn" onclick="filtrar('cachorro-grande',this)">🐕 Cão Grande</button>
    <button class="filter-btn" onclick="filtrar('gato',this)">🐱 Gatos</button>
    <button class="filter-btn" onclick="filtrar('praia',this)">🏖️ Praia</button>
    <button class="filter-btn" onclick="filtrar('fazenda',this)">🌾 Fazenda/Chácara</button>
    <button class="filter-btn" onclick="filtrar('apartamento',this)">🏢 Apartamento</button>
    <button class="filter-btn" onclick="filtrar('casa',this)">🏡 Casa/Quintal</button>
    <button class="filter-btn" onclick="filtrar('lazer',this)">⛲ Área de Lazer</button>
  </div>
  <div class="total-info" id="total-info"></div>
  <div class="grid" id="grade"></div>
</div>
<script>

  {id:'cg2',titulo:'RAÇÃO PREMIUM',sub:'Nutrição completa para raças grandes',tag:'cachorro-grande',cor:'#1a9e52',foto:'https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?w=1080&q=90'},

  {id:'cg4',titulo:'PASSEIO SEGURO',sub:'Guias, coleiras e peitorais',tag:'cachorro-grande',cor:'#3498DB',foto:'https://images.unsplash.com/photo-1477884213360-7e9d7dcc1e48?w=1080&q=90'},
  {id:'cg5',titulo:'SAÚDE & BEM-ESTAR',sub:'Vacinas e consultas em dia',tag:'cachorro-grande',cor:'#F39C12',foto:'https://images.unsplash.com/photo-1583511655826-05700d52f4d1?w=1080&q=90'},

  {id:'ga1',titulo:'TOSA FELINA',sub:'Especialistas em cuidar de gatos',tag:'gato',cor:'#9B59B6',foto:'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=1080&q=90'},
  {id:'ga2',titulo:'CONSULTA FELINA',sub:'A saúde do seu gato em boas mãos',tag:'gato',cor:'#3498DB',foto:'https://images.unsplash.com/photo-1573865526739-10659fec78a5?w=1080&q=90'},
  {id:'ga3',titulo:'RAÇÃO PARA GATOS',sub:'As melhores marcas em estoque',tag:'gato',cor:'#F39C12',foto:'https://images.unsplash.com/photo-1495360010541-f48722b4b6b8?w=1080&q=90'},

  {id:'ga5',titulo:'BANHO GATOS',sub:'Banho especial sem estresse',tag:'gato',cor:'#2ECC71',foto:'https://images.unsplash.com/photo-1574158622682-e719b968efd7?w=1080&q=90'},
  {id:'ga6',titulo:'ADOTE COM AMOR',sub:'Venha conhecer nossos filhotes!',tag:'gato',cor:'#1a9e52',foto:'https://images.unsplash.com/photo-1548802673-380ab8ebc7b7?w=1080&q=90'},
  {id:'pr1',titulo:'VERÃO COM SEU PET',sub:'Banho pós-praia com desconto!',tag:'praia',cor:'#F39C12',foto:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1080&q=90'},
  {id:'pr2',titulo:'PASSEIO NA PRAIA',sub:'Produtos para o verão do seu pet',tag:'praia',cor:'#3498DB',foto:'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=1080&q=90'},
  {id:'pr3',titulo:'FÉRIAS FELIZES',sub:'Cuide do pet antes de viajar!',tag:'praia',cor:'#2ECC71',foto:'https://images.unsplash.com/photo-1473116763249-9ba006682a52?w=1080&q=90'},
  {id:'pr4',titulo:'PROTETOR SOLAR PET',sub:'Proteja seu pet no verão',tag:'praia',cor:'#E74C3C',foto:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1080&q=90'},
  {id:'fz1',titulo:'PETS NA NATUREZA',sub:'Ração e acessórios para o campo',tag:'fazenda',cor:'#1a9e52',foto:'https://images.unsplash.com/photo-1500595046743-cd271d694d30?w=1080&q=90'},

  {id:'fz3',titulo:'AVENTURA NA FAZENDA',sub:'Produtos para pets aventureiros',tag:'fazenda',cor:'#E74C3C',foto:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1080&q=90'},
  {id:'fz4',titulo:'AR LIVRE & SAÚDE',sub:'Antiparasitários e vacinas',tag:'fazenda',cor:'#2ECC71',foto:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1080&q=90'},
  {id:'ap1',titulo:'PET NO APARTAMENTO',sub:'Tudo para pets em espaços menores',tag:'apartamento',cor:'#9B59B6',foto:'https://images.unsplash.com/photo-1545249849-1eaf0bff03ee?w=1080&q=90'},
  {id:'ap2',titulo:'CONFORTO EM CASA',sub:'Caminhas, brinquedos e muito mais!',tag:'apartamento',cor:'#3498DB',foto:'https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?w=1080&q=90'},
  {id:'ap3',titulo:'PET CITY',sub:'Seu pet feliz na cidade!',tag:'apartamento',cor:'#F39C12',foto:'https://images.unsplash.com/photo-1586105251261-72a756497a11?w=1080&q=90'},
  {id:'ca1',titulo:'QUINTAL FELIZ',sub:'Brinquedos e acessórios ao ar livre',tag:'casa',cor:'#2ECC71',foto:'https://images.unsplash.com/photo-1558788353-f76d92427f16?w=1080&q=90'},
  {id:'ca2',titulo:'PET EM CASA',sub:'Tudo para o seu melhor amigo',tag:'casa',cor:'#E74C3C',foto:'https://images.unsplash.com/photo-1601758125946-6ec2ef64daf8?w=1080&q=90'},
  {id:'ca3',titulo:'FAMÍLIA & PET',sub:'Porque ele é parte da família!',tag:'casa',cor:'#9B59B6',foto:'https://images.unsplash.com/photo-1560807707-8cc77767d783?w=1080&q=90'},
  {id:'lz1',titulo:'ÁREA DE LAZER',sub:'Passeie com segurança e estilo',tag:'lazer',cor:'#F39C12',foto:'https://images.unsplash.com/photo-1534361960057-19f4434a73d9?w=1080&q=90'},
  {id:'lz2',titulo:'CLUBE DOS PETS',sub:'Fidelidade que rende prêmios!',tag:'lazer',cor:'#2ECC71',foto:'https://images.unsplash.com/photo-1548802673-380ab8ebc7b7?w=1080&q=90'},
  {id:'lz3',titulo:'DIVERSÃO GARANTIDA',sub:'Brinquedos e petiscos especiais',tag:'lazer',cor:'#3498DB',foto:'https://images.unsplash.com/photo-1534361960057-19f4434a73d9?w=1080&q=90'},
];
function renderArte(arte,canvas){
  const ctx=canvas.getContext('2d');const W=1080,H=1080;
  canvas.width=W;canvas.height=H;
  const img=new Image();img.crossOrigin='anonymous';img.src=arte.foto;
  const draw=()=>{
    ctx.clearRect(0,0,W,H);
    const sc=Math.max(W/img.naturalWidth,H/img.naturalHeight);
    const iw=img.naturalWidth*sc,ih=img.naturalHeight*sc;
    ctx.drawImage(img,(W-iw)/2,(H-ih)/2,iw,ih);
    const ov=ctx.createLinearGradient(0,0,0,H);
    ov.addColorStop(0,'rgba(0,0,0,0.22)');ov.addColorStop(0.4,'rgba(0,0,0,0.10)');ov.addColorStop(1,'rgba(0,0,0,0.85)');
    ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);
    const fg=ctx.createLinearGradient(0,0,W,0);
    fg.addColorStop(0,arte.cor);fg.addColorStop(1,arte.cor+'bb');
    ctx.fillStyle=fg;ctx.fillRect(0,0,W,115);
    ctx.save();ctx.font='56px serif';ctx.textBaseline='middle';ctx.textAlign='left';ctx.fillText('🐾',34,58);
    ctx.font='bold 40px "Fredoka One",cursive';ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=10;
    ctx.fillText('Amigão Petshop',110,58);ctx.restore();
    paw(ctx,W-55,55,26,'rgba(255,255,255,.3)');paw(ctx,W-105,78,17,'rgba(255,255,255,.2)');
    ctx.save();ctx.textAlign='left';ctx.textBaseline='bottom';ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=22;
    let fs=76;ctx.font=`900 ${fs}px Nunito,sans-serif`;
    while(ctx.measureText(arte.titulo).width>W-80&&fs>30){fs-=3;ctx.font=`900 ${fs}px Nunito,sans-serif`;}
    ctx.fillStyle=arte.cor;ctx.fillText(arte.titulo,44,H-218);ctx.fillStyle='#fff';ctx.fillText(arte.titulo,42,H-220);ctx.restore();
    ctx.save();ctx.textAlign='left';ctx.textBaseline='bottom';ctx.font='bold 38px Nunito,sans-serif';
    ctx.fillStyle='rgba(255,255,255,.93)';ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=14;ctx.fillText(arte.sub,42,H-148);ctx.restore();
    ctx.save();ctx.strokeStyle=arte.cor;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(42,H-124);ctx.lineTo(W-42,H-124);ctx.stroke();ctx.restore();
    ctx.save();ctx.textAlign='left';ctx.textBaseline='bottom';ctx.font='bold 32px Nunito,sans-serif';
    ctx.fillStyle='rgba(255,255,255,.88)';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=10;
    ctx.fillText('📱 WhatsApp  •  📍 Sua Cidade',42,H-44);
    ctx.font='italic 24px Nunito,sans-serif';ctx.fillStyle='rgba(255,255,255,.58)';
    ctx.fillText('Porque seu pet merece o melhor! 🐶🐱',42,H-12);ctx.restore();
    const lm=canvas.parentElement.querySelector('.loading-msg');if(lm)lm.remove();
  };
  if(img.complete&&img.naturalWidth){draw();}else{img.onload=draw;img.onerror=()=>{ctx.fillStyle='#1a2e1e';ctx.fillRect(0,0,W,H);};}
}
function paw(ctx,cx,cy,sz,color){
  ctx.save();ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(cx,cy+sz*.25,sz*.4,sz*.35,0,0,Math.PI*2);ctx.fill();
  [-0.55,-0.18,0.18,0.55].forEach(a=>{ctx.beginPath();ctx.ellipse(cx+Math.sin(a)*sz*.5,cy-Math.cos(a)*sz*.2,sz*.2,sz*.25,a,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}
function montarGrade(lista){
  const grade=document.getElementById('grade');
  document.getElementById('total-info').textContent=`${lista.length} artes disponíveis`;
  grade.innerHTML='';
  lista.forEach(arte=>{
    const card=document.createElement('div');card.className='card';card.dataset.tag=arte.tag;
    const wrap=document.createElement('div');wrap.className='canvas-wrap';
    const loading=document.createElement('div');loading.className='loading-msg';loading.innerHTML='<span>⏳ Carregando…</span>';
    const cv=document.createElement('canvas');cv.className='arte';cv.id='cv-'+arte.id;
    wrap.appendChild(loading);wrap.appendChild(cv);
    const footer=document.createElement('div');footer.className='card-footer';
    footer.innerHTML=`<div class="card-info"><h3>${arte.titulo}</h3><p>${arte.sub}</p></div><button class="btn-dl" onclick="baixar('${arte.id}','${arte.titulo}')">⬇️ Baixar</button>`;
    card.appendChild(wrap);card.appendChild(footer);grade.appendChild(card);
    setTimeout(()=>renderArte(arte,cv),60);
  });
}
function filtrar(tag,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  montarGrade(tag==='todos'?ARTES:ARTES.filter(a=>a.tag===tag));
}
function baixar(id,titulo){
  const cv=document.getElementById('cv-'+id);if(!cv)return;
  const link=document.createElement('a');
  link.download='amigao-'+titulo.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'.png';
  link.href=cv.toDataURL('image/png');link.click();
}
montarGrade(ARTES);
</script>
</body>
