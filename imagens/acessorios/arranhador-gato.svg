<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <!-- Cat Scratching Post with Platform and Ball -->

  <!-- Shadow -->
  <ellipse cx="140" cy="270" rx="60" ry="10" fill="#00000022"/>

  <!-- Base platform (bottom) -->
  <rect x="68" y="245" width="144" height="22" rx="8" fill="#5D4037"/>
  <rect x="68" y="245" width="144" height="10" rx="8" fill="#795548"/>
  <!-- Base side shading -->
  <rect x="68" y="245" width="22" height="22" rx="8" fill="#4E342E" opacity="0.5"/>
  <rect x="190" y="245" width="22" height="22" rx="8" fill="#6D4C41" opacity="0.3"/>

  <!-- Main post (sisal wrapped) -->
  <rect x="118" y="78" width="44" height="170" rx="6" fill="#8D6E63"/>

  <!-- Sisal texture - horizontal wrap lines -->
  <line x1="118" y1="88" x2="162" y2="88" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="96" x2="162" y2="96" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="104" x2="162" y2="104" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="112" x2="162" y2="112" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="120" x2="162" y2="120" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="128" x2="162" y2="128" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="136" x2="162" y2="136" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="144" x2="162" y2="144" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="152" x2="162" y2="152" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="160" x2="162" y2="160" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="168" x2="162" y2="168" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="176" x2="162" y2="176" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="184" x2="162" y2="184" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="192" x2="162" y2="192" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="200" x2="162" y2="200" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="208" x2="162" y2="208" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="216" x2="162" y2="216" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="224" x2="162" y2="224" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>
  <line x1="118" y1="232" x2="162" y2="232" stroke="#6D4C41" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="240" x2="162" y2="240" stroke="#A1887F" stroke-width="1.5" opacity="0.6"/>

  <!-- Post left shading -->
  <rect x="118" y="78" width="10" height="170" rx="5" fill="#6D4C41" opacity="0.5"/>
  <!-- Post right highlight -->
  <rect x="152" y="78" width="10" height="170" rx="5" fill="#BCAAA4" opacity="0.3"/>

  <!-- Top platform - green carpet -->
  <rect x="82" y="54" width="116" height="28" rx="10" fill="#388E3C"/>
  <rect x="82" y="54" width="116" height="12" rx="10" fill="#43A047"/>
  <!-- Platform sides -->
  <rect x="82" y="62" width="14" height="20" fill="#2E7D32" opacity="0.5"/>
  <rect x="184" y="62" width="14" height="20" fill="#4CAF50" opacity="0.3"/>

  <!-- Carpet texture on top platform -->
  <line x1="90" y1="58" x2="90" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="58" x2="100" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="58" x2="110" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="58" x2="120" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="58" x2="130" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="58" x2="140" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="58" x2="150" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="160" y1="58" x2="160" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="170" y1="58" x2="170" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="58" x2="180" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="58" x2="190" y2="66" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>

  <!-- String hanging from platform edge -->
  <line x1="84" y1="68" x2="72" y2="110" stroke="#8D6E63" stroke-width="2"/>

  <!-- Small ball at end of string -->
  <circle cx="66" cy="120" r="14" fill="#FF8F00"/>
  <circle cx="66" cy="120" r="10" fill="#FFA000"/>
  <!-- Ball shine -->
  <circle cx="61" cy="115" r="4" fill="#FFCA28" opacity="0.7"/>
</svg>
