<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280">
  <!-- Tennis Ball Style Pet Ball - Yellow-Green -->

  <!-- Shadow -->
  <ellipse cx="140" cy="258" rx="82" ry="14" fill="#00000022"/>

  <!-- Main ball circle -->
  <circle cx="140" cy="148" r="105" fill="#CDDC39"/>

  <!-- Ball shading - darker at bottom right -->
  <circle cx="140" cy="148" r="105" fill="url(#ballShade)"/>

  <!-- Define gradient simulation with layered circles -->
  <!-- Highlight zone - top left -->
  <circle cx="105" cy="110" r="55" fill="#E6EE9C" opacity="0.5"/>
  <circle cx="90" cy="95" r="30" fill="#F9FBE7" opacity="0.4"/>

  <!-- Shadow zone - bottom right -->
  <circle cx="185" cy="195" r="65" fill="#9E9D24" opacity="0.35"/>
  <circle cx="198" cy="208" r="40" fill="#827717" opacity="0.25"/>

  <!-- Tennis ball seam curves -->
  <!-- Seam 1 - flowing S-curve left side -->
  <path d="M46 110 Q68 140 46 175 Q38 158 40 140 Q42 122 46 110 Z" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <path d="M46 110 Q80 138 55 180" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>

  <!-- Seam 2 - opposing S-curve right side -->
  <path d="M234 110 Q212 140 234 175 Q242 158 240 140 Q238 122 234 110 Z" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <path d="M234 110 Q200 138 225 180" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>

  <!-- Additional seam detail - finer inner line -->
  <path d="M52 115 Q76 142 52 174" fill="none" stroke="#F0F4C3" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M228 115 Q204 142 228 174" fill="none" stroke="#F0F4C3" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Felt texture suggestion - subtle noise circles -->
  <circle cx="110" cy="130" r="3" fill="#C6CB2E" opacity="0.4"/>
  <circle cx="165" cy="120" r="4" fill="#D4D934" opacity="0.3"/>
  <circle cx="145" cy="170" r="3" fill="#C6CB2E" opacity="0.4"/>
  <circle cx="120" cy="165" r="3" fill="#D4D934" opacity="0.3"/>
  <circle cx="155" cy="148" r="2" fill="#B8BB28" opacity="0.4"/>
  <circle cx="130" cy="140" r="2" fill="#D4D934" opacity="0.3"/>

  <!-- Main highlight spot -->
  <ellipse cx="102" cy="100" rx="22" ry="16" fill="#FFFFFF" opacity="0.25"/>
  <ellipse cx="96" cy="94" rx="10" ry="8" fill="#FFFFFF" opacity="0.35"/>
</svg>
