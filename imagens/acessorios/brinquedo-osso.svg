  <circle cx="68" cy="196" r="8" fill="#CE93D8" opacity="0.4"/>

  <!-- Shaft of bone -->
  <path d="M82 196 Q90 172 140 152 Q190 132 198 140" fill="none" stroke="#9C27B0" stroke-width="40" stroke-linecap="butt"/>
