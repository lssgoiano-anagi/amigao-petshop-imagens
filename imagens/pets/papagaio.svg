  <path d="M118 295 Q114 304 106 305 Q108 298 118 290 Z" fill="#FF6F00"/>
  <path d="M118 295 Q116 305 110 310 Q110 302 118 290 Z" fill="#FF6F00"/>
  <path d="M162 295 Q170 302 176 298 Q172 292 162 290 Z" fill="#FF6F00"/>
  <path d="M162 295 Q166 304 174 305 Q172 298 162 290 Z" fill="#FF6F00"/>
