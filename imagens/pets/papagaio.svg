  <ellipse cx="162" cy="140" rx="14" ry="14" fill="#1A1A1A"/>
  <!-- Iris yellow -->
  <ellipse cx="118" cy="140" rx="8" ry="8" fill="#FDD835"/>
  <ellipse cx="162" cy="140" rx="8" ry="8" fill="#FDD835"/>
  <!-- Pupil -->
  <ellipse cx="118" cy="140" rx="5" ry="5" fill="#1A1A1A"/>
  <ellipse cx="162" cy="140" rx="5" ry="5" fill="#1A1A1A"/>
  <!-- Shine -->
