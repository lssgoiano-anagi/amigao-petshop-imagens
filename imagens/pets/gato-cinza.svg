<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <!-- Gray Cat - Sitting, Cartoon Flat -->

  <!-- Shadow -->
  <ellipse cx="140" cy="350" rx="60" ry="9" fill="#00000022"/>

  <!-- Tail curled around -->
  <path d="M192 295 Q228 272 230 235 Q232 202 216 192 Q202 186 196 202 Q192 218 200 240 Q205 262 194 282 Q191 288 192 295 Z" fill="#9E9E9E"/>

  <!-- Body -->
  <ellipse cx="136" cy="258" rx="70" ry="75" fill="#9E9E9E"/>

  <!-- Lighter belly -->
  <ellipse cx="136" cy="275" rx="36" ry="55" fill="#EEEEEE"/>
  <ellipse cx="136" cy="288" rx="26" ry="42" fill="#F5F5F5"/>

  <!-- Subtle stripe markings -->
  <path d="M88 232 Q95 224 102 230 Q96 238 88 232 Z" fill="#757575" opacity="0.5"/>
  <path d="M86 250 Q94 242 100 248 Q94 256 86 250 Z" fill="#757575" opacity="0.5"/>
  <path d="M184 232 Q177 224 170 230 Q176 238 184 232 Z" fill="#757575" opacity="0.5"/>
  <path d="M186 250 Q178 242 172 248 Q178 256 186 250 Z" fill="#757575" opacity="0.5"/>

  <!-- Front paws -->
  <ellipse cx="108" cy="326" rx="22" ry="16" fill="#9E9E9E"/>
  <ellipse cx="166" cy="326" rx="22" ry="16" fill="#9E9E9E"/>
  <!-- Paw toes -->
  <ellipse cx="100" cy="329" rx="7" ry="5" fill="#787878"/>
  <ellipse cx="108" cy="331" rx="7" ry="5" fill="#787878"/>
  <ellipse cx="116" cy="329" rx="7" ry="5" fill="#787878"/>
  <ellipse cx="158" cy="329" rx="7" ry="5" fill="#787878"/>
  <ellipse cx="166" cy="331" rx="7" ry="5" fill="#787878"/>
  <ellipse cx="174" cy="329" rx="7" ry="5" fill="#787878"/>

  <!-- Neck -->
  <rect x="118" y="164" width="38" height="42" rx="18" fill="#9E9E9E"/>

  <!-- Head -->
  <ellipse cx="140" cy="142" rx="62" ry="58" fill="#9E9E9E"/>

  <!-- Lighter face center -->
  <ellipse cx="140" cy="148" rx="42" ry="44" fill="#B0BEC5" opacity="0.4"/>

  <!-- Cheek puffs -->
  <ellipse cx="100" cy="158" rx="22" ry="18" fill="#AEAEAE"/>
  <ellipse cx="180" cy="158" rx="22" ry="18" fill="#AEAEAE"/>

  <!-- White muzzle -->
  <ellipse cx="140" cy="162" rx="30" ry="24" fill="#EEEEEE"/>
  <ellipse cx="140" cy="166" rx="24" ry="18" fill="#F5F5F5"/>

  <!-- Forehead stripes -->
  <path d="M122 102 Q140 97 158 102 Q156 109 140 107 Q124 109 122 102 Z" fill="#757575" opacity="0.5"/>
  <path d="M117 114 Q140 110 163 114 Q161 120 140 118 Q119 120 117 114 Z" fill="#757575" opacity="0.4"/>

  <!-- Nose -->
  <path d="M133 152 Q140 148 147 152 L144 158 Q140 162 136 158 Z" fill="#E57373"/>
  <ellipse cx="136" cy="154" rx="3" ry="2.5" fill="#C62828" opacity="0.4"/>
  <ellipse cx="144" cy="154" rx="3" ry="2.5" fill="#C62828" opacity="0.4"/>

  <!-- Mouth -->
  <path d="M140 162 L134 168" stroke="#BBAAAA" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M140 162 L146 168" stroke="#BBAAAA" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M126 172 Q134 178 140 176 Q146 178 154 172" stroke="#CCBBBB" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="145" y1="162" x2="192" y2="154" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="145" y1="166" x2="194" y2="165" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="145" y1="170" x2="190" y2="177" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="135" y1="162" x2="88" y2="154" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="135" y1="166" x2="86" y2="165" stroke="#E0E0E0" stroke-width="1.5"/>
  <line x1="135" y1="170" x2="90" y2="177" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- Eyes - blue-green teal -->
  <ellipse cx="116" cy="132" rx="16" ry="16" fill="#26A69A"/>
  <ellipse cx="164" cy="132" rx="16" ry="16" fill="#26A69A"/>
  <!-- Pupils -->
  <ellipse cx="116" cy="132" rx="7" ry="14" fill="#1A1A1A"/>
  <ellipse cx="164" cy="132" rx="7" ry="14" fill="#1A1A1A"/>
  <!-- Shine -->
  <ellipse cx="112" cy="127" rx="4" ry="5" fill="#ffffff"/>
  <ellipse cx="160" cy="127" rx="4" ry="5" fill="#ffffff"/>
  <ellipse cx="113" cy="127" rx="2" ry="3" fill="#ffffffcc"/>
  <ellipse cx="161" cy="127" rx="2" ry="3" fill="#ffffffcc"/>

  <!-- Ears - pointed -->
  <polygon points="88,112 76,70 114,96" fill="#9E9E9E"/>
  <polygon points="192,112 204,70 166,96" fill="#9E9E9E"/>
  <!-- Inner ear -->
  <polygon points="90,110 80,76 110,98" fill="#FFCDD2" opacity="0.8"/>
  <polygon points="190,110 200,76 170,98" fill="#FFCDD2" opacity="0.8"/>

  <!-- Ear fur -->
  <polygon points="88,112 76,70 114,96" fill="#888888" opacity="0.2"/>
</svg>
