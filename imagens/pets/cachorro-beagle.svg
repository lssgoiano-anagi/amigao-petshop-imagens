<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <!-- Tricolor Beagle - Brown, Black, White -->

  <!-- Shadow -->
  <ellipse cx="140" cy="348" rx="65" ry="10" fill="#00000022"/>

  <!-- Body -->
  <ellipse cx="140" cy="248" rx="72" ry="78" fill="#F5F5F5"/>

  <!-- Brown saddle on back -->
  <path d="M95 185 Q140 172 185 185 Q192 220 188 262 Q168 278 140 278 Q112 278 92 262 Q88 220 95 185 Z" fill="#8D4E1F"/>

  <!-- Black markings on saddle top -->
  <path d="M105 182 Q140 172 175 182 Q178 198 175 210 Q140 205 105 210 Q102 198 105 182 Z" fill="#1A1A1A"/>

  <!-- White belly -->
  <ellipse cx="140" cy="268" rx="38" ry="50" fill="#F5F5F5"/>

  <!-- Front legs -->
  <rect x="92" y="292" width="30" height="52" rx="15" fill="#F5F5F5"/>
  <rect x="158" y="292" width="30" height="52" rx="15" fill="#F5F5F5"/>
  <!-- Paws -->
  <ellipse cx="107" cy="344" rx="16" ry="10" fill="#E8E0D5"/>
  <ellipse cx="173" cy="344" rx="16" ry="10" fill="#E8E0D5"/>

  <!-- Haunches -->
  <ellipse cx="88" cy="278" rx="30" ry="36" fill="#F5F5F5"/>
  <ellipse cx="192" cy="278" rx="30" ry="36" fill="#8D4E1F"/>

  <!-- Black marking on right haunch -->
  <ellipse cx="192" cy="268" rx="20" ry="24" fill="#1A1A1A"/>

  <!-- Tail - white with brown base -->
  <path d="M210 235 Q248 212 244 182 Q240 165 228 172 Q220 185 225 208 Q220 228 205 236 Z" fill="#F5F5F5"/>

  <!-- Neck -->
  <rect x="118" y="158" width="44" height="46" rx="20" fill="#F5F5F5"/>
  <!-- Black marking on neck -->
  <rect x="118" y="158" width="44" height="22" rx="12" fill="#1A1A1A"/>

  <!-- Head -->
  <ellipse cx="140" cy="136" rx="60" ry="56" fill="#8D4E1F"/>

  <!-- White blaze on face -->
  <path d="M130 90 Q140 86 150 90 L152 148 Q140 152 128 148 Z" fill="#F5F5F5"/>

  <!-- Black top of head -->
  <path d="M90 128 Q115 95 140 90 Q165 95 190 128 Q178 112 165 108 Q140 102 115 108 Q102 112 90 128 Z" fill="#1A1A1A"/>

  <!-- Snout -->
  <ellipse cx="140" cy="158" rx="30" ry="24" fill="#F5F5F5"/>
  <ellipse cx="140" cy="162" rx="24" ry="18" fill="#F5F5F5"/>

  <!-- Nose -->
  <ellipse cx="140" cy="150" rx="13" ry="9" fill="#1A1A1A"/>
  <ellipse cx="135" cy="147" rx="4" ry="3" fill="#ffffff44"/>

  <!-- Mouth -->
  <path d="M128 166 Q140 176 152 166" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="116" cy="130" rx="13" ry="13" fill="#2C1B00"/>
  <ellipse cx="164" cy="130" rx="13" ry="13" fill="#2C1B00"/>
  <!-- Tan eyebrow patches -->
  <ellipse cx="116" cy="120" rx="10" ry="6" fill="#C87941"/>
  <ellipse cx="164" cy="120" rx="10" ry="6" fill="#C87941"/>
  <!-- Eye whites -->
  <ellipse cx="113" cy="127" rx="4" ry="4" fill="#ffffff"/>
  <ellipse cx="161" cy="127" rx="4" ry="4" fill="#ffffff"/>
  <ellipse cx="114" cy="127" rx="2" ry="2" fill="#ffffffcc"/>
  <ellipse cx="162" cy="127" rx="2" ry="2" fill="#ffffffcc"/>

  <!-- Long floppy ears -->
  <path d="M80 112 Q60 130 58 168 Q58 196 74 210 Q84 218 96 210 Q100 188 98 158 Q96 132 90 118 Z" fill="#8D4E1F"/>
  <path d="M200 112 Q220 130 222 168 Q222 196 206 210 Q196 218 184 210 Q180 188 182 158 Q184 132 190 118 Z" fill="#8D4E1F"/>

  <!-- Ear inner shadow -->
  <path d="M82 120 Q68 138 68 170 Q68 192 80 204 Q88 200 90 178 Q92 152 88 128 Z" fill="#6B3912" opacity="0.6"/>
  <path d="M198 120 Q212 138 212 170 Q212 192 200 204 Q192 200 190 178 Q188 152 192 128 Z" fill="#6B3912" opacity="0.6"/>
</svg>
