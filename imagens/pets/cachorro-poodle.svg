<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 360">
  <!-- White Fluffy Poodle - Cartoon Flat Style -->

  <!-- Shadow -->
  <ellipse cx="140" cy="348" rx="58" ry="10" fill="#00000022"/>

  <!-- Body pompom -->
  <ellipse cx="140" cy="240" rx="55" ry="58" fill="#FAFAFA"/>
  <circle cx="122" cy="225" r="22" fill="#FAFAFA"/>
  <circle cx="158" cy="225" r="22" fill="#FAFAFA"/>
  <circle cx="140" cy="210" r="24" fill="#FAFAFA"/>
  <circle cx="118" cy="245" r="20" fill="#FAFAFA"/>
  <circle cx="162" cy="245" r="20" fill="#FAFAFA"/>
  <circle cx="140" cy="260" r="22" fill="#FAFAFA"/>
  <circle cx="120" cy="265" r="18" fill="#FAFAFA"/>
  <circle cx="160" cy="265" r="18" fill="#FAFAFA"/>

  <!-- Body shading -->
  <ellipse cx="140" cy="240" rx="54" ry="57" fill="#F0F0F0" opacity="0.3"/>

  <!-- Slim legs (shaved) -->
  <rect x="104" y="285" width="18" height="42" rx="9" fill="#EFEFEF"/>
  <rect x="158" y="285" width="18" height="42" rx="9" fill="#EFEFEF"/>

  <!-- Paw pompoms -->
  <circle cx="113" cy="334" r="16" fill="#FAFAFA"/>
  <circle cx="105" cy="336" r="12" fill="#FAFAFA"/>
  <circle cx="121" cy="336" r="12" fill="#FAFAFA"/>
  <circle cx="113" cy="342" r="11" fill="#FAFAFA"/>

  <circle cx="167" cy="334" r="16" fill="#FAFAFA"/>
  <circle cx="159" cy="336" r="12" fill="#FAFAFA"/>
  <circle cx="175" cy="336" r="12" fill="#FAFAFA"/>
  <circle cx="167" cy="342" r="11" fill="#FAFAFA"/>

  <!-- Tail - pompom at end -->
  <rect x="188" y="220" width="12" height="38" rx="6" fill="#EFEFEF" transform="rotate(20 188 220)"/>
  <circle cx="208" cy="200" r="18" fill="#FAFAFA"/>
  <circle cx="200" cy="192" r="14" fill="#FAFAFA"/>
  <circle cx="216" cy="192" r="14" fill="#FAFAFA"/>

  <!-- Neck slim -->
  <rect x="126" y="162" width="28" height="40" rx="14" fill="#EFEFEF"/>

  <!-- Head pompom cluster -->
  <circle cx="140" cy="138" r="38" fill="#FAFAFA"/>
  <circle cx="115" cy="125" r="24" fill="#FAFAFA"/>
  <circle cx="165" cy="125" r="24" fill="#FAFAFA"/>
  <circle cx="140" cy="108" r="26" fill="#FAFAFA"/>
  <circle cx="122" cy="112" r="22" fill="#FAFAFA"/>
  <circle cx="158" cy="112" r="22" fill="#FAFAFA"/>
  <circle cx="130" cy="148" r="20" fill="#FAFAFA"/>
  <circle cx="150" cy="148" r="20" fill="#FAFAFA"/>

  <!-- Muzzle -->
  <ellipse cx="140" cy="158" rx="24" ry="20" fill="#F5F5F5"/>

  <!-- Nose -->
  <ellipse cx="140" cy="150" rx="10" ry="8" fill="#1A1A1A"/>
  <ellipse cx="136" cy="148" rx="3" ry="2" fill="#ffffff55"/>

  <!-- Mouth -->
  <path d="M130 162 Q140 170 150 162" stroke="#AAAAAA" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="120" cy="138" rx="11" ry="11" fill="#1A1A1A"/>
  <ellipse cx="160" cy="138" rx="11" ry="11" fill="#1A1A1A"/>
  <ellipse cx="117" cy="135" rx="4" ry="4" fill="#ffffff"/>
  <ellipse cx="157" cy="135" rx="4" ry="4" fill="#ffffff"/>
  <ellipse cx="118" cy="135" rx="2" ry="2" fill="#ffffffcc"/>
  <ellipse cx="158" cy="135" rx="2" ry="2" fill="#ffffffcc"/>

  <!-- Top knot bow -->
  <path d="M122 95 Q130 85 140 90 Q150 85 158 95 Q150 105 140 102 Q130 105 122 95 Z" fill="#FF80AB"/>
  <circle cx="140" cy="95" r="6" fill="#F50057"/>

  <!-- Ear pompoms hanging -->
  <circle cx="96" cy="145" r="20" fill="#FAFAFA"/>
  <circle cx="88" cy="155" r="16" fill="#FAFAFA"/>
  <circle cx="96" cy="162" r="16" fill="#FAFAFA"/>

  <circle cx="184" cy="145" r="20" fill="#FAFAFA"/>
  <circle cx="192" cy="155" r="16" fill="#FAFAFA"/>
  <circle cx="184" cy="162" r="16" fill="#FAFAFA"/>
</svg>
